services:
  - type: web
    name: job-hub
    runtime: node
    plan: free
    # 根目录构建：先装前端依赖并构建，再装后端依赖
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENABLE_SCHEDULER
        value: "false"
      - key: JWT_SECRET
        generateValue: true
